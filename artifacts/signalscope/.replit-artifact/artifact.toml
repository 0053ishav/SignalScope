kind = "web"
previewPath = "/"
title = "SignalScope"
version = "1.0.0"
id = "artifacts/signalscope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23142

[services.development]
run = "pnpm --filter @workspace/signalscope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signalscope", "run", "build" ]
publicDir = "artifacts/signalscope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23142"
BASE_PATH = "/"
